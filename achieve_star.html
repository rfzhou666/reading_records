<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #FFF9E3; font-family: 'Microsoft YaHei', sans-serif; padding: 10px; margin: 0; }
        .page-title { text-align: center; color: #FF8C00; font-size: 22px; margin: 15px 0; }
        
        /* 新增：统计行样式 */
        .stats-bar { 
            text-align: center; 
            color: #A35200; 
            font-size: 14px; 
            margin-bottom: 20px; 
            font-weight: bold; 
            opacity: 0.8; 
        }
        
        .reading-wall { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 600px; margin: 0 auto; justify-items: center; }
        
        /* 卡片基础样式 */
        .book-item { background: white; border-radius: 10px; padding: 8px; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        
        /* 图片容器与金边 (对应你的参数) */
        .img-wrapper { position: relative; width: 100%; max-width: 110px; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; box-sizing: border-box; }
        .is-unlocked {
            border: 4px solid transparent;
            background-image: linear-gradient(#222, #222), linear-gradient(135deg, #FFE082 0%, #FFD700 45%, #B8860B 55%, #FFE082 100%);
            background-origin: border-box; background-clip: padding-box, border-box;
            box-shadow: inset 0 0 10px 4px #FFD700, inset 0 2px 2px rgba(255,255,255,0.6), inset 0 -2px 2px rgba(0,0,0,0.4), inset 0 0 1px 1px rgba(100,60,0,0.8), 0 0 10px 4px #FFD700, 0 0 15px 5px rgba(255,255,255,0.5), 0 0 25px 2px rgba(255,255,255,0.2);
        }
        .is-locked { border: 3px solid #F0F0F0; filter: grayscale(100%); opacity: 0.4; }
        .glass-reflection { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; backdrop-filter: blur(0.2px); background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.1) 100%); box-shadow: inset 0 0 1px 0.5px rgba(255,255,255,0.3); pointer-events: none; }
        .book-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.1s; display: block; z-index: 1; }
        
        /* 文字 Hover */
        .status-tag { margin-top: 5px; font-size: 11px; font-weight: bold; color: #5D4037; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: 0.2s; cursor: pointer; }
        .status-tag:hover { color: #FF8C00; transform: scale(1.1); }
        .date-info { font-size: 9px; margin-top: 1px; color: #FF8C00; }

        /* --- 核心：泡泡弹窗样式 --- */
        #note-bubble {
            position: fixed; display: none; z-index: 1000;
            background: #FFFBE6; border: 2px solid #FFD700; border-radius: 15px;
            padding: 12px; max-width: 200px; color: #5D4037; font-size: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            pointer-events: none; /* 防止挡住鼠标点击 */
        }
        /* 泡泡的小尖角 */
        #note-bubble::after {
            content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 10px solid #FFD700;
        }
    </style>

    <script>
        const bubble = document.getElementById('note-bubble');
        let timer;

        function showBubble(event, text) {
            event.stopPropagation();
            bubble.innerText = text;
            bubble.style.display = 'block';
            
            // 计算位置：在点击位置下方
            const x = event.clientX;
            const y = event.clientY + 20;
            
            // 防止超出屏幕右侧
            let leftPos = x - (bubble.offsetWidth / 2);
            if(leftPos + bubble.offsetWidth > window.innerWidth) leftPos = window.innerWidth - bubble.offsetWidth - 10;
            if(leftPos < 10) leftPos = 10;

            bubble.style.left = leftPos + 'px';
            bubble.style.top = y + 'px';

            // 3秒后自动消失，或者再次点击消失
            clearTimeout(timer);
            timer = setTimeout(() => { bubble.style.display = 'none'; }, 3000);
        }

        // 点击页面其他地方泡泡消失
        document.addEventListener('click', () => { bubble.style.display = 'none'; });
    </script>
