
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<script type="module" src="./model-viewer.min.js"></script>
<style>
    body { background: #121212; color: white; font-family: 'PingFang SC', sans-serif; margin: 0; padding: 10px; }
    
    /* 标题置顶强制显示 */
    .header-title { 
        text-align: center; color: #ffd700; 
        padding: 15px 0; font-size: 1.3rem; font-weight: bold;
        text-shadow: 0 2px 10px rgba(255,215,0,0.3);
        width: 100%;
    }

    .gallery-container { max-width: 800px; margin: auto; }
    
    /* 展示框样式 */
    .hero-section { 
        width: 100%; height: 350px; 
        background-color: #e0f7fa; 
        background-image: radial-gradient(circle at center, #ffffff 0%, #b2ebf2 100%);
        border-radius: 25px; margin-bottom: 20px; 
        position: relative; overflow: hidden; 
        border: 4px solid #fff;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    
    .hero-label { 
        position: absolute; top: 12px; left: 12px; 
        background: #ff4757; color: #fff; padding: 5px 12px; border-radius: 20px; 
        font-weight: bold; font-size: 11px; z-index: 10;
        box-shadow: 0 0 10px rgba(255, 71, 87, 0.6);
        animation: glow 1.5s infinite;
        display: none; 
    }
    @keyframes glow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    
    #main-viewer { width: 100%; height: 100%; outline: none; }

    .hero-info-display {
        position: absolute; bottom: 10px; width: 100%; text-align: center;
        color: #006064; pointer-events: none; line-height: 1.2;
    }
    .hero-name { font-weight: bold; font-size: 16px; }
    .hero-date { font-size: 10px; opacity: 0.8; }

    /* 强制三格网格布局 */
    .grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); /* 强制三格 */
        gap: 8px; 
        padding: 5px;
    }

    .card { 
        background: #252525; border-radius: 12px; padding: 8px 5px; 
        text-align: center; border: 1px solid #333;
    }
    
    .thumb-viewer { width: 100%; height: 70px; border-radius: 8px; pointer-events: none; --poster-color: transparent; }
    .locked-box { width: 100%; height: 70px; background-color: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #555; }
    
    .m-name { font-weight: bold; margin-top: 5px; color: #eee; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .m-points { color: #ffd700; font-size: 10px; font-weight: bold; }
    .m-date { color: #666; font-size: 9px; margin-top: 2px; }
    
    .p-bar-bg { width: 100%; background: #444; height: 3px; border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .p-bar-fill { background: #ff7f50; height: 100%; }

    model-viewer::part(poster) { display: none; }
</style>
</head>
<body>
    <h2 class="header-title">🐤菜鸡进化 (4 分)</h2>
    
    <div class="gallery-container">
        <div class="hero-section">
            <div class="hero-label" id="new-tag">最新解锁 ✨</div>
            <model-viewer id="main-viewer" src="model/chick_baby_chicken_bird.glb" 
                autoplay animation-name="*" auto-rotate camera-controls 
                shadow-intensity="1" shadow-softness="1" environment-image="neutral"
                camera-target="0m 0.5m 0m"
                field-of-view="20deg">
            </model-viewer>
            <div class="hero-info-display">
                <div class="hero-name" id="hero-name">雏鸡</div>
                <div class="hero-date" id="hero-date">解锁时间：2026-03-23</div>
            </div>
        </div>

        <div class="grid">
            
    <div class="card" onclick="changeHero('model/bobbing_bird.glb', '蛋蛋鸡', '1', '2026-03-16')">
        <model-viewer class="thumb-viewer" src="model/bobbing_bird.glb" loading="lazy"></model-viewer>
        <div class="m-name">蛋蛋鸡</div>
        <div class="m-points">1 分</div>
        <div class="m-date">2026-03-16</div>
    </div>
    
    <div class="card" onclick="changeHero('model/minecraft_bird.glb', '像素菜鸡', '2', '2026-03-19')">
        <model-viewer class="thumb-viewer" src="model/minecraft_bird.glb" loading="lazy"></model-viewer>
        <div class="m-name">像素菜鸡</div>
        <div class="m-points">2 分</div>
        <div class="m-date">2026-03-19</div>
    </div>
    
    <div class="card" onclick="changeHero('model/chick_baby_chicken_bird.glb', '雏鸡', '3', '2026-03-23')">
        <model-viewer class="thumb-viewer" src="model/chick_baby_chicken_bird.glb" loading="lazy"></model-viewer>
        <div class="m-name">雏鸡</div>
        <div class="m-points">3 分</div>
        <div class="m-date">2026-03-23</div>
    </div>
    
    <div class="card" style="opacity: 0.6;">
        <div class="locked-box">?</div>
        <div class="m-name">???</div>
        <div class="m-points">5 分</div>
        <div class="p-bar-bg"><div class="p-bar-fill" style="width: 80.0%"></div></div>
    </div>
    
    <div class="card" style="opacity: 0.6;">
        <div class="locked-box">?</div>
        <div class="m-name">???</div>
        <div class="m-points">8 分</div>
        <div class="p-bar-bg"><div class="p-bar-fill" style="width: 50.0%"></div></div>
    </div>
    
    <div class="card" style="opacity: 0.6;">
        <div class="locked-box">?</div>
        <div class="m-name">???</div>
        <div class="m-points">13 分</div>
        <div class="p-bar-bg"><div class="p-bar-fill" style="width: 30.76923076923077%"></div></div>
    </div>
    
    <div class="card" style="opacity: 0.6;">
        <div class="locked-box">?</div>
        <div class="m-name">???</div>
        <div class="m-points">21 分</div>
        <div class="p-bar-bg"><div class="p-bar-fill" style="width: 19.047619047619047%"></div></div>
    </div>
    
    <div class="card" style="opacity: 0.6;">
        <div class="locked-box">?</div>
        <div class="m-name">???</div>
        <div class="m-points">34 分</div>
        <div class="p-bar-bg"><div class="p-bar-fill" style="width: 11.76470588235294%"></div></div>
    </div>

        <div class="locked-box">?</div>

        <div class="p-bar-bg"><div class="p-bar-fill" style="width: 7.2727272727272725%"></div></div>
    </div>
    
        </div>
    </div>

<script>
const LATEST_POINTS = 3;

function changeHero(file, name, points, date) {
    const viewer = document.getElementById('main-viewer');
    const nameLabel = document.getElementById('hero-name');
    const dateLabel = document.getElementById('hero-date');
    const newTag = document.getElementById('new-tag');
    
    viewer.setAttribute('src', file);
    nameLabel.innerText = name;
    dateLabel.innerText = "解锁时间：" + date;
    
    // 逻辑：判断是否是最新解锁
    newTag.style.display = (parseInt(points) === LATEST_POINTS) ? 'block' : 'none';
    
    // 强制重置视角以防穿模或距离错误
    viewer.fieldOfView = "20deg";
}

window.onload = () => {
    const initialPoints = 3;
    if (initialPoints === LATEST_POINTS && initialPoints !== -1) {
        document.getElementById('new-tag').style.display = 'block';
    }
};
</script>
</body>
</html>
