<style>
    .gallery-container { font-family: 'PingFang SC', sans-serif; max-width: 1000px; margin: auto; padding: 20px; background: #121212; border-radius: 20px; color: #fff; }
    .header-title { text-align: center; color: #ffd700; margin-bottom: 25px; }
    .hero-section { 
        width: 100%; height: 400px; background: #1e1e1e; border-radius: 15px; margin-bottom: 30px; 
        position: relative; overflow: hidden; border: 2px solid #444;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }
    .hero-label { position: absolute; top: 15px; left: 15px; background: rgba(255, 215, 0, 0.9); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; z-index: 10; }
    #main-viewer { width: 100%; height: 100%; --poster-color: transparent; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .card { background: #252525; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
    .card:hover { border-color: #ffd700; transform: translateY(-3px); }
    .thumb-viewer { width: 100%; height: 120px; background-color: #1a1a1a; border-radius: 8px; pointer-events: none; }
    .locked-box { width: 100%; height: 120px; background-color: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #555; }
    .m-name { font-weight: bold; margin-top: 10px; color: #eee; font-size: 14px; }
    .m-points { color: #ffd700; font-size: 13px; font-weight: bold; margin-top: 4px; }
    .m-date { font-size: 10px; color: #666; margin-top: 4px; }
    .p-bar-bg { width: 100%; background: #333; height: 5px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .p-bar-fill { background: #4CAF50; height: 100%; }
</style>

<div class="gallery-container">
    <h2 class="header-title">🏆 盈生🐤 的成就馆 (4 分)</h2>
    
    <div class="hero-section">

        <model-viewer id="main-viewer" src="model/phoenix_bird.glb" 
            autoplay animation-name="*" auto-rotate camera-controls

        </model-viewer>
    </div>

    <div class="grid">
        
    <div class="card" onclick="changeHero('./model/bird_orange.glb', '小鸡', '2026-03-16')">

    <div class="card" onclick="changeHero('./model/phoenix_bird.glb', '凤凰', '2026-03-19')">

    </div>

<script>
function changeHero(filePath, modelName, modelDate) {
    const viewer = document.getElementById('main-viewer');
    const tag = document.getElementById('hero-tag');
    
    if (viewer) {
        // 1. 更新模型路径
        viewer.setAttribute('src', filePath);
        // 2. 更新文字显示
        tag.innerText = "展示中: " + modelName + " (" + modelDate + ")";
        console.log("正在切换模型到:", filePath);
    }
}
</script>
